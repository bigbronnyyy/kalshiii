<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalshi Quant Bot</title>
<style>
:root {
  --bg: #0d0d0d;
  --card: #161616;
  --border: rgba(255,255,255,0.07);
  --text: #e8e8ec;
  --text2: #a0a0a8;
  --text3: #666670;
  --accent: #00c853;
  --red: #ff4d4d;
  --amber: #f5a623;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

.container { max-width: 900px; margin: 0 auto; padding: 1rem; }

/* Tab bar */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

.tab {
  padding: 12px 24px;
  background: transparent;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: color 0.2s;
  border-bottom: 2px solid transparent;
  position: relative;
  bottom: -1px;
}

.tab:hover { color: var(--text); }

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Tab content */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Cards & fields */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.card-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: block;
}

.field {
  margin-bottom: 12px;
}

.field label {
  display: block;
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 6px;
  font-weight: 500;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 10px 12px;
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--accent);
}

.field input::placeholder,
.field textarea::placeholder {
  color: var(--text3);
}

/* Grid layouts */
.field-grid {
  display: grid;
  gap: 12px;
  margin-bottom: 12px;
}

.field-grid.row-2 { grid-template-columns: 1fr 1fr; }
.field-grid.row-3 { grid-template-columns: repeat(3, 1fr); }

.field-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  margin-bottom: 12px;
}

.field-row .field { margin: 0; flex: 1; }
.field-row button { margin: 0; }

/* Prob display */
.prob-display {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 12px;
}

.prob-box {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  text-align: center;
}

.prob-box-label {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.prob-box-value {
  font-size: 24px;
  font-weight: 600;
  color: var(--accent);
}

/* Evidence accordion */
.accordion-btn {
  width: 100%;
  padding: 12px 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.accordion-btn:hover {
  border-color: var(--accent);
}

.accordion-content {
  display: none;
  padding-bottom: 12px;
}

.accordion-content.open {
  display: block;
}

.evidence-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.evidence-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  background: rgba(255,255,255,0.01);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}

.evidence-item:hover {
  background: rgba(255,255,255,0.03);
  border-color: var(--accent);
}

.evidence-btn {
  width: 24px;
  height: 24px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  transition: all 0.2s;
}

.evidence-btn.bull {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,200,83,0.1);
}

.evidence-btn.bear {
  border-color: var(--red);
  color: var(--red);
  background: rgba(255,77,77,0.1);
}

.evidence-label {
  flex: 1;
  font-size: 13px;
  color: var(--text);
}

.evidence-weight {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
}

/* Buttons */
.btn {
  padding: 11px 16px;
  background: rgba(0,200,83,0.1);
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: var(--accent);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  text-transform: uppercase;
}

.btn:hover {
  background: rgba(0,200,83,0.15);
}

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 1rem;
}

.btn-row .btn { flex: 1; }

/* Status & Loading */
.status-msg {
  font-size: 12px;
  color: var(--text3);
  margin-top: 8px;
  min-height: 18px;
}

.status-msg.error { color: var(--red); }

.loading {
  display: none;
  text-align: center;
  padding: 3rem;
}

.loading.on { display: block; }

.loading-bar {
  width: 200px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin: 0 auto 1rem;
}

.loading-fill {
  height: 100%;
  background: var(--accent);
  animation: sweep 1.8s ease-in-out infinite;
}

@keyframes sweep {
  0% { width: 0; margin-left: 0; }
  50% { width: 100%; margin-left: 0; }
  51% { margin-left: 0; }
  100% { width: 0; margin-left: 100%; }
}

.loading-txt {
  font-size: 12px;
  color: var(--text3);
}

/* Results */
.results {
  display: none;
}

.results.on { display: block; }

.verdict {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.sig-badge {
  display: inline-block;
  font-size: 14px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 4px;
  margin-bottom: 1rem;
}

.sig-buy {
  background: rgba(0,200,83,0.15);
  border: 1px solid rgba(0,200,83,0.3);
  color: var(--accent);
}

.sig-sell {
  background: rgba(255,77,77,0.15);
  border: 1px solid rgba(255,77,77,0.3);
  color: var(--red);
}

.sig-skip {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text2);
}

.verdict-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}

.metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 1rem;
}

.metric {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
}

.metric-label {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}

.metric-value {
  font-size: 20px;
  font-weight: 600;
  color: var(--accent);
}

/* Tables */
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 12px;
}

.table th {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  color: var(--text3);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}

.table tr:hover td {
  background: rgba(0,200,83,0.05);
}

/* Chat */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 600px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-message {
  display: flex;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
}

.chat-message.user {
  background: rgba(0,200,83,0.1);
  border-color: rgba(0,200,83,0.2);
}

.chat-message.user .sender {
  color: var(--accent);
}

.chat-message.bot .sender {
  color: var(--text3);
}

.sender {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.message-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}

.chat-input-area {
  padding: 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

.chat-input-area textarea {
  flex: 1;
  resize: none;
  max-height: 100px;
}

.chat-input-area .btn {
  padding: 10px 14px;
  align-self: flex-end;
}

/* Mobile responsive */
@media (max-width: 768px) {
  .prob-display { grid-template-columns: 1fr; }
  .evidence-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .field-grid.row-2,
  .field-grid.row-3 { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  .metrics { grid-template-columns: 1fr; }
  .tab { padding: 10px 14px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="container">

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab active" onclick="switchTab('trade')">Trade Deck</button>
  <button class="tab" onclick="switchTab('history')">History</button>
  <button class="tab" onclick="switchTab('chat')">Chat</button>
</div>

<!-- TAB 1: TRADE DECK -->
<div class="tab-content active" id="tab-trade">

  <!-- Ticker input -->
  <div class="card">
    <div class="field-row">
      <div class="field" style="flex: 2;">
        <label>Ticker</label>
        <input type="text" id="ticker" placeholder="e.g. KXBTCD-26MAR1900-T74999.99" oninput="onTickerInput()" />
      </div>
      <button class="btn" onclick="fetchTicker()" style="align-self: flex-end;">FETCH</button>
    </div>
    <div id="auto-status" style="font-size: 11px; color: var(--text3); margin-top: 6px;"></div>
  </div>

  <!-- Probabilities -->
  <div class="card">
    <span class="card-label">Probability estimates</span>
    <div class="prob-display">
      <div class="prob-box">
        <div class="prob-box-label">Prior %</div>
        <div class="prob-box-value" id="prob-prior">50</div>
      </div>
      <div class="prob-box">
        <div class="prob-box-label">Posterior %</div>
        <div class="prob-box-value" id="prob-posterior">50</div>
      </div>
      <div class="prob-box">
        <div class="prob-box-label">Model %</div>
        <div class="prob-box-value" id="prob-model">50</div>
      </div>
    </div>
  </div>

  <!-- Evidence accordion -->
  <div class="card">
    <button class="accordion-btn" onclick="toggleAccordion()">
      <span>Evidence (16 signals) — expand to check</span>
      <span id="accordion-arrow">▼</span>
    </button>
    <div class="accordion-content" id="accordion-content">
      <div class="evidence-grid" id="evidence-grid"></div>
    </div>
  </div>

  <!-- Trade sizing -->
  <div class="card">
    <span class="card-label">Size the trade</span>
    <div class="field-grid row-2">
      <div class="field">
        <label>Market price (¢)</label>
        <input type="number" id="market-price" placeholder="auto-filled" min="1" max="99" />
      </div>
      <div class="field">
        <label>Bankroll ($) optional</label>
        <input type="number" id="bankroll" placeholder="e.g. 500" />
      </div>
    </div>
    <div class="field-grid row-2">
      <div class="field">
        <label>Kelly fraction</label>
        <select id="kelly-frac">
          <option value="0.25">0.25x — conservative</option>
          <option value="0.5">0.5x — moderate</option>
          <option value="1.0">1.0x — full Kelly</option>
        </select>
      </div>
      <div class="field">
        <label>Manual model probability (optional)</label>
        <input type="number" id="model-override" min="1" max="99" placeholder="leave blank to use estimates" />
      </div>
    </div>
    <div class="field">
      <label>Context (optional)</label>
      <textarea id="context" rows="2" placeholder="Describe what you see: price vs strike, news, sentiment..."></textarea>
    </div>
  </div>

  <!-- Analyze button -->
  <div class="btn-row">
    <button class="btn" onclick="runAnalysis()" id="run-btn">▶ Run Analysis</button>
  </div>
  <div class="status-msg" id="status-msg"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-bar"><div class="loading-fill"></div></div>
    <div class="loading-txt">Computing...</div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="verdict">
      <div class="sig-badge" id="sig-badge">—</div>
      <div class="verdict-text" id="verdict-text"></div>
    </div>
    <div class="metrics" id="metrics-display"></div>
    <div class="card">
      <span class="card-label">Trade plan</span>
      <div id="trade-plan" style="font-size: 13px; line-height: 1.6; color: var(--text);"></div>
    </div>
    <div class="card">
      <span class="card-label">Key risks</span>
      <div id="risks-plan" style="font-size: 13px; line-height: 1.6; color: var(--text);"></div>
    </div>
    <div class="card" style="border-left: 3px solid var(--amber); background: rgba(245,166,35,0.05);">
      <div id="bottom-line" style="font-size: 13px; font-weight: 500; color: var(--amber);"></div>
    </div>
  </div>

</div>

<!-- TAB 2: HISTORY -->
<div class="tab-content" id="tab-history">

  <!-- DB Status -->
  <div class="card">
    <span class="card-label">Market data status</span>
    <div style="display: grid; gap: 8px;">
      <div style="display: flex; justify-content: space-between;">
        <span style="color: var(--text3);">Markets tracked:</span>
        <span id="db-markets">—</span>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <span style="color: var(--text3);">Snapshots:</span>
        <span id="db-snapshots">—</span>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <span style="color: var(--text3);">Last update:</span>
        <span id="db-updated">—</span>
      </div>
    </div>
    <button class="btn" onclick="loadDbStatus()" style="width: 100%; margin-top: 1rem;">Refresh</button>
  </div>

  <!-- Movers -->
  <div class="card">
    <span class="card-label">Market movers (last hour)</span>
    <div id="movers-container" style="overflow-x: auto;">
      <table class="table" id="movers-table">
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Price</th>
            <th>Change</th>
            <th>Direction</th>
          </tr>
        </thead>
        <tbody id="movers-body"></tbody>
      </table>
    </div>
    <button class="btn" onclick="loadMovers()" style="width: 100%; margin-top: 1rem;">Refresh</button>
  </div>

  <!-- Price history -->
  <div class="card">
    <span class="card-label">Price history</span>
    <div class="field">
      <label>Ticker</label>
      <div style="display: flex; gap: 10px;">
        <input type="text" id="history-ticker" placeholder="e.g. KXBTCD-26MAR1900-T74999.99" style="flex: 1;" />
        <button class="btn" onclick="loadHistory()">Load</button>
      </div>
    </div>
    <div id="history-container" style="overflow-x: auto; margin-top: 1rem;">
      <table class="table" id="history-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- TAB 3: CHAT -->
<div class="tab-content" id="tab-chat">

  <div class="chat-container">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <textarea id="chat-input" placeholder="Ask about markets, probabilities, strategies..." rows="2"></textarea>
      <button class="btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

</div>

<script>
const PROXY = "https://kalshiii-production.up.railway.app";
const PKEY = "super_random_password_12345678910";

// Evidence configuration
const EVIDENCE = {
  mom1: { delta: 0.08, label: "Price trending toward strike" },
  mom2: { delta: -0.08, label: "Price trending away from strike" },
  mom3: { delta: 0, label: "Price within 1% of strike" },
  mom4: { delta: 0.05, label: "Strong volume supporting direction" },
  mac1: { delta: 0.07, label: "Bullish macro catalyst" },
  mac2: { delta: -0.07, label: "Bearish macro catalyst" },
  mac3: { delta: 0.09, label: "Major supply shock" },
  mac4: { delta: -0.05, label: "Policy response dampening move" },
  str1: { delta: -0.04, label: "Major psychological level" },
  str2: { delta: 0.06, label: "Recently broke above strike" },
  str3: { delta: -0.06, label: "Recent rejection at strike" },
  str4: { delta: 0.04, label: "Strong support below price" },
  sen1: { delta: -0.05, label: "Extreme fear/panic" },
  sen2: { delta: 0.04, label: "Greed/neutral sentiment" },
  sen3: { delta: -0.02, label: "Resolution >24h" },
  sen4: { delta: 0.03, label: "Resolution <6h" }
};

// State
const state = {};
let cachedMarket = null;
let historicalBase = 0.5;
let priceStats = null;
let fetchTimer = null;
let accordionOpen = false;

// Utility functions
function logit(p) { return Math.log(p / (1 - p)); }
function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');

  // Initialize on first load
  if (tab === 'history') { initHistory(); }
  if (tab === 'chat') { initChat(); }
}

function toggleAccordion() {
  const content = document.getElementById('accordion-content');
  accordionOpen = !accordionOpen;
  content.classList.toggle('open');
  document.getElementById('accordion-arrow').textContent = accordionOpen ? '▲' : '▼';
  if (accordionOpen) renderEvidence();
}

function renderEvidence() {
  const grid = document.getElementById('evidence-grid');
  if (grid.children.length > 0) return; // Already rendered

  let html = '';
  Object.entries(EVIDENCE).forEach(([id, cfg]) => {
    const isActive = state[id];
    const btnClass = isActive ? (cfg.delta >= 0 ? 'bull' : 'bear') : '';
    const btnText = isActive ? (cfg.delta >= 0 ? '↑' : '↓') : '–';
    html += `
      <div class="evidence-item" onclick="toggleEvidence('${id}')">
        <button class="evidence-btn ${btnClass}" id="evbtn-${id}">${btnText}</button>
        <span class="evidence-label">${cfg.label}</span>
        <span class="evidence-weight">${cfg.delta >= 0 ? '+' : ''}${(cfg.delta*100).toFixed(0)}%</span>
      </div>`;
  });
  grid.innerHTML = html;
}

function toggleEvidence(id) {
  state[id] = !state[id];
  const btn = document.getElementById(`evbtn-${id}`);
  const cfg = EVIDENCE[id];

  btn.classList.remove('bull', 'bear');
  if (state[id]) {
    btn.classList.add(cfg.delta >= 0 ? 'bull' : 'bear');
    btn.textContent = cfg.delta >= 0 ? '↑' : '↓';
  } else {
    btn.textContent = '–';
  }
  updateProb();
}

function updateProb() {
  const base = historicalBase;
  let logitP = logit(base);

  Object.entries(state).forEach(([id, on]) => {
    if (on && EVIDENCE[id].delta !== 0) {
      logitP += EVIDENCE[id].delta * 2.5;
    }
  });

  const posterior = Math.min(0.95, Math.max(0.05, sigmoid(logitP)));
  const override = parseFloat(document.getElementById('model-override').value);
  const modelP = (!isNaN(override) && override > 0) ? override / 100 : posterior;

  document.getElementById('prob-prior').textContent = (base * 100).toFixed(0);
  document.getElementById('prob-posterior').textContent = (posterior * 100).toFixed(0);
  document.getElementById('prob-model').textContent = (modelP * 100).toFixed(0);

  return { base, posterior, modelP };
}

function onTickerInput() {
  clearTimeout(fetchTimer);
  const q = document.getElementById('ticker').value.trim().toUpperCase();
  if (q.length > 10 && q.includes('-') && !q.includes(' ')) {
    document.getElementById('auto-status').textContent = 'Fetching data...';
    fetchTimer = setTimeout(() => fetchTicker(), 800);
  } else {
    document.getElementById('auto-status').textContent = '';
    cachedMarket = null;
  }
}

async function fetchTicker() {
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  if (!ticker) return;

  try {
    document.getElementById('auto-status').textContent = 'Fetching...';
    const r = await fetch(`${PROXY}/market/${encodeURIComponent(ticker)}`, {
      headers: { 'x-proxy-api-key': PKEY }
    });

    if (!r.ok) throw new Error('Not found');
    const d = await r.json();
    if (!d.market) throw new Error('No market data');

    cachedMarket = d.market;
    const m = cachedMarket;

    // Auto-fill price
    const raw = m.last_price_dollars ?? m.yes_ask_dollars ?? m.yes_bid_dollars ?? null;
    if (raw && parseFloat(raw) > 0) {
      document.getElementById('market-price').value = Math.round(parseFloat(raw) * 100);
    }

    document.getElementById('auto-status').textContent = `✓ ${m.subtitle || ticker} — ${m.status}`;

    // Fetch base rate
    try {
      const sr = await fetch(`${PROXY}/market/${encodeURIComponent(ticker)}/stats`, {
        headers: { 'x-proxy-api-key': PKEY }
      });
      if (sr.ok) {
        const stats = await sr.json();
        if (stats && stats.avg_yes_price != null) {
          priceStats = stats;
          historicalBase = stats.avg_yes_price;
          updateProb();
        }
      }
    } catch(_) {}

  } catch(e) {
    document.getElementById('auto-status').textContent = '✗ Ticker not found';
    cachedMarket = null;
  }
}

function setStatus(msg, error = false) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status-msg' + (error ? ' error' : '');
}

// Robust JSON extraction
function extractJSON(txt) {
  // 1. Try direct parse
  try {
    return JSON.parse(txt.trim());
  } catch(_) {}

  // 2. Strip markdown fences
  try {
    const stripped = txt.replace(/```json|```/gi, '').trim();
    return JSON.parse(stripped);
  } catch(_) {}

  // 3. Find first { ... } block
  const match = txt.match(/\{[\s\S]*\}/);
  if (match) {
    try {
      return JSON.parse(match[0]);
    } catch(_) {}
  }

  // 4. Fix common JSON issues
  try {
    const fixed = txt
      .replace(/```json|```/gi, '')
      .replace(/,\s*([}\]])/g, '$1')
      .replace(/([{,]\s*)(\w+)(\s*:)/g, '$1"$2"$3')
      .match(/\{[\s\S]*\}/)?.[0];

    if (fixed) {
      return JSON.parse(fixed);
    }
  } catch(_) {}

  throw new Error('Could not extract JSON from response');
}

async function runAnalysis() {
  const ticker = document.getElementById('ticker').value.trim();
  const priceCents = parseFloat(document.getElementById('market-price').value);
  const bankroll = parseFloat(document.getElementById('bankroll').value) || null;
  const kf = parseFloat(document.getElementById('kelly-frac').value);
  const ctx = document.getElementById('context').value.trim();

  if (!ticker) { setStatus('Enter a ticker', true); return; }
  if (!priceCents || isNaN(priceCents)) { setStatus('Enter market price', true); return; }

  const { base, posterior, modelP } = updateProb();
  const finalModelP = modelP;
  const marketP = priceCents / 100;

  setStatus('');
  document.getElementById('results').classList.remove('on');
  document.getElementById('loading').classList.add('on');
  document.getElementById('run-btn').disabled = true;

  // Fetch live market if not cached
  let liveMarket = cachedMarket;
  if (!liveMarket) {
    try {
      const r = await fetch(`${PROXY}/market/${encodeURIComponent(ticker)}`, {
        headers: { 'x-proxy-api-key': PKEY }
      });
      if (r.ok) {
        const d = await r.json();
        liveMarket = d.market || null;
      }
    } catch(_) {}
  }

  // Build prompt
  const activeEvidence = Object.entries(state)
    .filter(([_, on]) => on)
    .map(([id, _]) => `${EVIDENCE[id].label} (${EVIDENCE[id].delta >= 0 ? '+' : ''}${(EVIDENCE[id].delta*100).toFixed(0)}%)`)
    .join('; ') || 'none selected';

  const prompt = `You are a Kalshi prediction market quant analyst. Return ONLY valid JSON, no markdown, no preamble.

IMPORTANT: output raw JSON only, no markdown, no code fences, no explanation

MARKET: ${ticker}
Market price: ${priceCents}¢ (${(marketP*100).toFixed(1)}%)
Base rate prior: ${(base*100).toFixed(0)}%
Bayesian posterior: ${(posterior*100).toFixed(0)}%
Final model probability: ${(finalModelP*100).toFixed(1)}%
Active evidence: ${activeEvidence}
User context: ${ctx || 'none'}
Bankroll: ${bankroll ? '$' + bankroll : 'not specified'}
Kelly fraction: ${kf}x
Today: March 20 2026

Compute EV and Kelly sizing. Return exactly this JSON:
{
  "signal": "BUY" or "SELL" or "SKIP",
  "confidence": "HIGH" or "MEDIUM" or "LOW",
  "verdict": "2-3 sentence explanation",
  "trade_plan": "3-4 sentences on entry, confirmation, exit",
  "risks": ["risk 1", "risk 2", "risk 3"],
  "bottom_line": "one sharp sentence"
}`;

  try {
    const res = await fetch(`${PROXY}/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-proxy-api-key': PKEY },
      body: JSON.stringify({ prompt, model: 'claude-sonnet-4-6', max_tokens: 1000 })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Request failed');

    const txt = (data.content || []).map(b => b.text || '').join('');
    const parsed = extractJSON(txt);

    renderResults(parsed, marketP, finalModelP, base, bankroll, kf);

  } catch(e) {
    document.getElementById('loading').classList.remove('on');
    document.getElementById('run-btn').disabled = false;
    setStatus('Error: ' + e.message, true);
  }
}

function renderResults(p, marketP, modelP, base, bankroll, kf) {
  document.getElementById('loading').classList.remove('on');
  document.getElementById('run-btn').disabled = false;

  const sig = p.signal || 'SKIP';
  const sigBadge = document.getElementById('sig-badge');
  sigBadge.textContent = sig;
  sigBadge.className = 'sig-badge ' + (sig === 'BUY' ? 'sig-buy' : sig === 'SELL' ? 'sig-sell' : 'sig-skip');

  document.getElementById('verdict-text').textContent = p.verdict || '';

  // EV calculation
  const evVal = (modelP - marketP) / marketP;
  const evSig = evVal > 0.05 ? 'BUY' : evVal < -0.05 ? 'SELL' : 'SKIP';

  // Kelly calculation
  const b = (1 - marketP) / marketP;
  const q = 1 - modelP;
  const fullKelly = (modelP * b - q) / b;
  const scaledKelly = Math.max(fullKelly, 0) * kf;

  let html = `
    <div class="metric">
      <div class="metric-label">Base rate</div>
      <div class="metric-value">${(base*100).toFixed(0)}%</div>
    </div>
    <div class="metric">
      <div class="metric-label">Model prob</div>
      <div class="metric-value">${(modelP*100).toFixed(0)}%</div>
    </div>
    <div class="metric">
      <div class="metric-label">EV</div>
      <div class="metric-value" style="color: ${evSig === 'BUY' ? 'var(--accent)' : evSig === 'SELL' ? 'var(--red)' : 'var(--text2)'}">
        ${(evVal*100).toFixed(1)}%
      </div>
    </div>
    <div class="metric">
      <div class="metric-label">Kelly</div>
      <div class="metric-value">${(scaledKelly*100).toFixed(1)}%</div>
    </div>
    <div class="metric">
      <div class="metric-label">Position</div>
      <div class="metric-value">
        ${bankroll && scaledKelly > 0 ? '$' + (bankroll * scaledKelly).toFixed(0) : '—'}
      </div>
    </div>
  `;
  document.getElementById('metrics-display').innerHTML = html;

  document.getElementById('trade-plan').textContent = p.trade_plan || '—';

  const risksHtml = (p.risks || []).map(r => `<div style="margin-bottom: 6px;">• ${r}</div>`).join('');
  document.getElementById('risks-plan').innerHTML = risksHtml || '—';

  document.getElementById('bottom-line').textContent = p.bottom_line || '—';

  document.getElementById('results').classList.add('on');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

// CHAT TAB
let messages = [];

function initChat() {
  if (document.getElementById('chat-messages').children.length === 0) {
    renderChat();
  }
}

function renderChat() {
  const container = document.getElementById('chat-messages');
  container.innerHTML = messages.map((m, i) => `
    <div class="chat-message ${m.role}">
      <div>
        <div class="sender">${m.role === 'user' ? 'You' : 'Bot'}</div>
        <div class="message-text">${escapeHtml(m.text)}</div>
      </div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  // Add user message
  messages.push({ role: 'user', text });
  input.value = '';
  renderChat();

  // Call bot
  try {
    const prompt = `You are a Kalshi prediction market quant analyst. The user will ask you questions about markets, probabilities, strategies, and trade sizing. Answer concisely and accurately. Today: March 20 2026.

User: ${text}`;

    const res = await fetch(`${PROXY}/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-proxy-api-key': PKEY },
      body: JSON.stringify({ prompt, model: 'claude-sonnet-4-6', max_tokens: 500 })
    });

    if (!res.ok) throw new Error('Request failed');
    const data = await res.json();
    const reply = (data.content || []).map(b => b.text || '').join('').trim();

    messages.push({ role: 'bot', text: reply });
    renderChat();

  } catch(e) {
    messages.push({ role: 'bot', text: `Error: ${e.message}` });
    renderChat();
  }
}
